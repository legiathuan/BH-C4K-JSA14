<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
    </head>
    <body>
        <!doctype html>
        <html lang="vi">
            <head>
                <meta charset="UTF-8" />
                <meta
                    name="viewport"
                    content="width=device-width, initial-scale=1.0"
                />
                <title>Registration Form</title>
                <link rel="stylesheet" href="./baithuchanh1.css" />
            </head>
            <body>
                <div class="container">
                    <h2>Registration</h2>

                    <form>
                        <div class="form-grid">
                            <div class="input-box">
                                <label>Full Name</label>
                                <input
                                    type="text"
                                    placeholder="Enter your name"
                                />
                            </div>

                            <div class="input-box">
                                <label>Username</label>
                                <input
                                    type="text"
                                    placeholder="Enter your username"
                                />
                            </div>

                            <div class="input-box">
                                <label>Email</label>
                                <input
                                    type="email"
                                    placeholder="Enter your email"
                                />
                            </div>

                            <div class="input-box">
                                <label>Phone Number</label>
                                <input
                                    type="text"
                                    placeholder="Enter your number"
                                />
                            </div>

                            <div class="input-box">
                                <label>Password</label>
                                <input
                                    type="password"
                                    placeholder="Enter your password"
                                />
                            </div>

                            <div class="input-box">
                                <label>Confirm Password</label>
                                <input
                                    type="password"
                                    placeholder="Confirm your password"
                                />
                            </div>
                        </div>

                        <div class="gender-box">
                            <label>Gender</label>

                            <div class="gender-options">
                                <label>
                                    <input type="radio" name="gender" />
                                    Male
                                </label>

                                <label>
                                    <input type="radio" name="gender" />
                                    Female
                                </label>

                                <label>
                                    <input type="radio" name="gender" />
                                    Prefer not to say
                                </label>
                            </div>
                        </div>

                        <button type="submit">Register</button>
                    </form>
                </div>
            </body>
        </html>
    </body>
</html>
